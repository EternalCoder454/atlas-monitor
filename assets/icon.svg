  </defs>

  <!-- rounded base -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <!-- top sheen -->
  <path d="M16 132 Q16 16 132 16 L380 16 Q496 16 496 132 L496 250 Q256 200 16 250 Z"
