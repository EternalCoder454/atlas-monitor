    <line x1="96" y1="270" x2="416" y2="270"/>
    <line x1="96" y1="350" x2="416" y2="350"/>
  </g>

  <!-- area chart -->
  <path d="M96 410 L96 300 L150 255 L204 288 L258 198 L312 240 L366 162 L416 205 L416 410 Z"
        fill="url(#fill)"/>
  <path d="M96 300 L150 255 L204 288 L258 198 L312 240 L366 162 L416 205"
